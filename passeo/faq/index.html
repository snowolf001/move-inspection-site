<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ | Passeo</title>

    <link rel="stylesheet" href="/assets/css/site.css" />

    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        overflow-x: hidden;
      }

      a {
        color: #dbeafe;
        text-decoration: none;
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px 16px 56px;
      }

      .breadcrumb {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 14px;
      }

      /* mobile docs nav */
      .docs-nav-mobile {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        margin-bottom: 16px;
      }

      .docs-nav-mobile a {
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        white-space: nowrap;
      }

      .docs-nav-mobile a.active {
        background: rgba(37, 99, 235, 0.2);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .sidebar {
        display: none;
      }

      .content {
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }

      h1 {
        font-size: clamp(30px, 8vw, 46px);
        margin-bottom: 10px;
      }

      h2 {
        font-size: clamp(22px, 6vw, 24px);
        margin-bottom: 12px;
      }

      /* FAQ items */

      details {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 12px;
        background: var(--card-inner);
      }

      summary {
        cursor: pointer;
        padding: 16px;
        font-weight: 700;
        font-size: 15px;
        line-height: 1.5;
      }

      details[open] summary {
        background: rgba(37, 99, 235, 0.1);
        border-bottom: 1px solid var(--border);
      }

      .answer {
        padding: 16px;
      }

      .answer p {
        color: var(--soft);
        font-size: 15px;
        line-height: 1.7;
      }

      @media (min-width: 900px) {
        .docs-nav-mobile {
          display: none;
        }

        .layout {
          grid-template-columns: 250px 1fr;
          gap: 24px;
        }

        .sidebar {
          display: block;
          position: sticky;
          top: 80px;
          padding: 20px;
          border-radius: 20px;
          background: var(--card);
          border: 1px solid var(--border);
        }
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="/">Clean Utility Apps</a>
      </div>
    </header>

    <div class="page">
      <div class="breadcrumb">Home / Passeo / FAQ</div>

      <!-- mobile nav -->
      <div class="docs-nav-mobile">
        <a href="/passeo/">Overview</a>
        <a href="/passeo/getting-started/">Getting Started</a>
        <a href="/passeo/roles/">Roles</a>
        <a href="/passeo/sessions/">Sessions</a>
        <a class="active" href="/passeo/faq/">FAQ</a>
      </div>

      <div class="layout">
        <aside class="sidebar">
          <h3>Passeo</h3>
          <nav>
            <a href="/passeo/">Overview</a><br />
            <a href="/passeo/getting-started/">Getting Started</a><br />
            <a href="/passeo/roles/">Roles</a><br />
            <a href="/passeo/sessions/">Sessions</a><br />
            <a href="/passeo/faq/">FAQ</a>
          </nav>
        </aside>

        <main class="content">
          <section class="card">
            <h1>FAQ</h1>
            <p>Common questions about Passeo.</p>
          </section>

          <section class="card">
            <details open>
              <summary>What is Passeo?</summary>
              <div class="answer">
                <p>Passeo is a club management app.</p>
              </div>
            </details>

            <details>
              <summary>Who is it for?</summary>
              <div class="answer">
                <p>Clubs, groups, and small organizations.</p>
              </div>
            </details>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
