<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Move Inspection – Rental Report App</title>

  <meta name="description" content="Create professional move-in and move-out inspection reports with photos and PDF export." />
  <link rel="icon" href="./icon.png" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LBCQ8VL0TB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LBCQ8VL0TB');
  </script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #0b1c3a, #08142b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px 60px;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 40px;
      margin: 10px 0;
    }

    .subtitle {
      color: #94a3b8;
    }

    .desc {
      color: #cbd5e1;
      margin: 20px 0;
    }

    .buttons {
      margin: 30px 0;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid #3b82f6;
    }

    /* ✅ 修复重点在这里 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      max-width: 260px;
      margin: 0 auto;
    }

    .card img {
      width: 100%;
      border-radius: 16px;
      display: block;
    }

    .section {
      margin-top: 60px;
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="./icon.png" class="logo" />

    <h1>Move Inspection</h1>
    <p class="subtitle">Avoid deposit disputes.</p>

    <p class="desc">
      Document property condition with photos and generate professional reports in minutes.
    </p>

    <div class="buttons">
      <a id="play" class="btn"
        href="https://play.google.com/store/apps/details?id=com.cleanutilityapps.moveinspection"
        target="_blank">
        Download on Google Play
      </a>

      <a id="app" class="btn secondary"
        href="https://apps.apple.com/us/app/move-inspection-rental-report/id6760746173"
        target="_blank">
        Download on App Store
      </a>
    </div>

    <div class="grid">
      <div class="card"><img src="./1_propertylist.png" /></div>
      <div class="card"><img src="./2_roomlist.png" /></div>
      <div class="card"><img src="./3_inspectionTracking.png" /></div>
      <div class="card"><img src="./4_additem.png" /></div>
      <div class="card"><img src="./5_exportReport.png" /></div>
    </div>

    <div class="section">
      <h2>Why people use it</h2>
      <p>📸 Photo evidence · 📄 PDF reports · ⚡ Offline · 🛡 Deposit protection</p>
    </div>

    <footer>© 2026 Clean Utility Apps</footer>
  </div>

  <!-- Vercel Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <script>
    function track(name, data = {}) {
      if (typeof gtag === "function") {
        gtag("event", name, data);
      }
    }

    document.getElementById("play").onclick = () => {
      track("store_click", { store: "google_play" });
    };

    document.getElementById("app").onclick = () => {
      track("store_click", { store: "app_store" });
    };
  </script>
</body>
</html>
